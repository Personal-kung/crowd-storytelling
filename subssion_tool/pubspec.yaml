name: subssion_tool
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  signature: ^5.5.0 # For tablet/phone handwriting
  image_picker: ^1.0.7 # For photo uploads
  file_picker: ^8.0.0 # For font sample uploads
  google_fonts: ^6.2.1 # For the "Computer Text" preview
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
